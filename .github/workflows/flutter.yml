name: Flutter

# Heavy Flutter SDK install + Linux desktop build, split out of ci.yml so PRs that
# don't touch Dart/Flutter files skip it. Runs on main and on any change to lib/ or pubspec.
on:
  push:
    branches: [main]
    paths: ['lib/**', 'pubspec.yaml', 'pubspec.lock', '.github/workflows/flutter.yml']
  pull_request:
    paths: ['lib/**', 'pubspec.yaml', 'pubspec.lock', '.github/workflows/flutter.yml']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter desktop app
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build pkg-config

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter app
        run: flutter analyze

      - name: Test Flutter app
        run: flutter test

      - name: Build Linux desktop app
        run: flutter build linux --debug
