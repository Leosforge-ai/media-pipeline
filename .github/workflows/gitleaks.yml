name: gitleaks

# Secret scanning via the free gitleaks CLI binary (ci.yml covers shellcheck/ruff/flutter).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version: '1.21'
      - name: Install gitleaks CLI
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          sudo mv "$(go env GOPATH)/bin/gitleaks" /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --source . --log-opts "origin/main..HEAD" --redact --verbose
