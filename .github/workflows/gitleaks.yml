name: gitleaks

# Secret scanning via the free gitleaks CLI binary (ci.yml covers shellcheck/ruff/flutter).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          # gitleaks v8.30.1 (pinned below) declares `go 1.24.11` in its go.mod, i.e.
          # it needs a Go toolchain >= 1.24.11. Keep this in step with GITLEAKS_VERSION.
          go-version: '1.24'
      - name: Install gitleaks CLI
        env:
          # Pinned to a specific tag, not @latest: a floating @latest previously broke
          # this workflow the moment gitleaks shipped a release requiring a newer Go
          # than this job's hardcoded go-version (issue #73). To bump deliberately:
          #   1. Check the new tag's minimum Go version:
          #      curl -s "https://proxy.golang.org/github.com/zricethezav/gitleaks/v8/@v/vX.Y.Z.mod" | grep "^go "
          #   2. Raise `go-version` above if that minimum exceeds it.
          #   3. Confirm the tag is a real release: curl -s https://proxy.golang.org/github.com/zricethezav/gitleaks/v8/@v/list
          #   4. Update GITLEAKS_VERSION to the new tag.
          GITLEAKS_VERSION: v8.30.1
        run: |
          go install "github.com/zricethezav/gitleaks/v8@${GITLEAKS_VERSION}"
          sudo mv "$(go env GOPATH)/bin/gitleaks" /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --source . --log-opts "origin/main..HEAD" --redact --verbose
