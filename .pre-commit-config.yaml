# Local hooks for media-pipeline (Dart + Bash + Python). CI (ci.yml) also runs shellcheck/ruff;
# this gives the same gates pre-push, plus commit-msg + gitleaks + markdown.
# Install: pre-commit install && git config core.hooksPath .githooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: ["-x", "-e", "SC1091"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
        files: '\.py$'

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.12.1
    hooks:
      - id: markdownlint-cli2
        types: [markdown]

  - repo: local
    hooks:
      - id: commit-msg-format
        name: commit message format
        language: script
        entry: .githooks/check-commit-msg.sh
        stages: [commit-msg]
        pass_filenames: true

      - id: gitleaks
        name: gitleaks (staged diff)
        entry: |
          bash -c 'if command -v gitleaks >/dev/null 2>&1; then
            git diff --cached | gitleaks detect --pipe --redact
          else
            git diff --cached | docker run --rm -i zricethezav/gitleaks:latest detect --pipe --redact
          fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]
